<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Caption App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📸 Photo Caption App</h1>

  <!-- LOGIN -->
  <section id="login-section">
    <h2>Login</h2>
    <label for="email">Email:</label>
    <input type="email" id="email" placeholder="Email">
    <label for="password">Password:</label>
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="login-status"></p>
  </section>

  <!-- IMAGE GALLERY -->
  <section id="gallery">
    <h2>Images</h2>
    <div id="images-container"></div>
  </section>

  <!-- SINGLE IMAGE VIEW -->
  <section id="image-detail" style="display:none;">
    <h2>Image Details</h2>
    <img id="detail-img" />
    <h3 id="detail-title"></h3>

    <h4 style="margin-bottom: 7px;">Captions:</h4>
    <ul id="captions-list" style="margin-top: 0;"></ul>

    <h4 style="margin-top: 10px; margin-bottom: 5px;">Add Caption</h4>
    <div style="display:flex; flex-wrap:wrap; gap:10px;">
      <input type="text" id="caption-input" placeholder="Enter caption...">
      <button onclick="addCaption()">Submit</button>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
