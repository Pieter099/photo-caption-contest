<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Photo Caption App</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>📸 Photo Caption App</h1>

  <!-- LOGIN -->
  <section id="login-section">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <p id="login-status"></p>
  </section>

  <!-- IMAGE GALLERY -->
  <section id="gallery">
    <h2>Images</h2>
    <div id="images-container"></div>
  </section>

  <!-- SINGLE IMAGE VIEW -->
  <section id="image-detail" style="display:none;">
    <h2>Image Details</h2>
    <img id="detail-img" />
    <h3 id="detail-title"></h3>

    <h4>Captions:</h4>
    <ul id="captions-list"></ul>

    <h4>Add Caption</h4>
    <input type="text" id="caption-input" placeholder="Write caption...">
    <button onclick="addCaption()">Submit Caption</button>
  </section>

  <script src="script.js"></script>
</body>
</html>
